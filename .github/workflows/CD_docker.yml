  #   DEPLOY_SSH_KEY     → clave privada SSH (sin passphrase)
  #   DB_ROOT_PASSWORD   → contraseña root MariaDB
  #   DB_USER            → usuario MariaDB
  #   DB_PASSWORD        → contraseña MariaDB
