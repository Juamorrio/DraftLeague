name: Codacy CI

on:
  push:
    branches:
      - trunk

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: draftleague_test
          MYSQL_USER: draftleague_user
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up JDK 21
      uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b 
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Wait for MySQL
      run: |
        sudo apt-get install -y mysql-client
        mysql --host 127.0.0.1 --port 3306 -u root -p${{ secrets.MYSQL_ROOT_PASSWORD }} -e "SELECT 1"

    - name: Build and Test with Maven
      run: mvn clean verify
      env:
        SPRING_DATASOURCE_URL: jdbc:mariadb://localhost:3306/draftleague_test
        SPRING_DATASOURCE_USERNAME: draftleague_user
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver

    - name: Upload coverage to Codacy
      uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}