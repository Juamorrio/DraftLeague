name: Codacy CI

on:
  push:
    

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: draftleague
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install dependencies and run tests
      working-directory: ./backend
      run: |
        mvn clean install -DskipTests
        mvn test
      env:
        SPRING_PROFILES_ACTIVE: test
        SPRING_DATASOURCE_URL: jdbc:mariadb://127.0.0.1:3306/draftleague_test
        SPRING_DATASOURCE_USERNAME: draftleague_user
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
        HIBERNATE_DIALECT: org.hibernate.dialect.MariaDBDialect

    - name: Upload coverage to Codacy
      working-directory: ./backend
      run: |
        mvn jacoco:report
        bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r target/site/jacoco/jacoco.xml
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}