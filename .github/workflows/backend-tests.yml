name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests with JaCoCo
        run: mvn verify -Dspring.profiles.active=test

      - name: Upload JaCoCo HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Test summary
        if: always()
        run: |
          echo "## Test Run Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/*.xml ]; then
            TESTS=$(grep -h 'tests=' target/surefire-reports/*.xml | grep -oP 'tests="\K[^"]+' | paste -sd+ | bc 2>/dev/null || echo "N/A")
            FAILURES=$(grep -h 'failures=' target/surefire-reports/*.xml | grep -oP 'failures="\K[^"]+' | paste -sd+ | bc 2>/dev/null || echo "N/A")
            ERRORS=$(grep -h 'errors=' target/surefire-reports/*.xml | grep -oP 'errors="\K[^"]+' | paste -sd+ | bc 2>/dev/null || echo "N/A")
            echo "- Tests run: $TESTS" >> $GITHUB_STEP_SUMMARY
            echo "- Failures: $FAILURES" >> $GITHUB_STEP_SUMMARY
            echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
          else
            echo "No surefire reports found." >> $GITHUB_STEP_SUMMARY
          fi
