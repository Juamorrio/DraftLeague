name: Dockerfile Frontend – Regression Test

on:
  push:
    branches: ["**"]
    paths:
      - "Dockerfile.frontend"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "scripts/regression/test_dockerfile_frontend_npm.sh"
      - ".github/workflows/dockerfile-frontend-regression.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "Dockerfile.frontend"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "scripts/regression/test_dockerfile_frontend_npm.sh"
      - ".github/workflows/dockerfile-frontend-regression.yml"

jobs:
  regression:
    name: npm install fails, npm ci succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Pinned to the v3 tag's commit SHA per Codacy's third-party action
        # pinning rule. Refresh this SHA when bumping to a new major/minor.
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker

      - name: Run Dockerfile.frontend regression test
        run: ./scripts/regression/test_dockerfile_frontend_npm.sh
