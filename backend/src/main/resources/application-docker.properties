spring.application.name=backend

# ── MariaDB (variables de entorno inyectadas por Docker) ─────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://db:3306/draftleague?tinyInt1isBit=false}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:draftuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:draftpass}

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ── SQL init ──────────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
# Ejecutar schema.sql DESPUÉS de que Hibernate cree las entidades
spring.jpa.defer-datasource-initialization=true

# ── Spring MVC ────────────────────────────────────────────────────────────────
spring.mvc.pathpattern.matching-strategy=ant_path_matcher

# ── H2 desactivado en Docker ─────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── Actuator (para healthcheck del contenedor) ───────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# ── API-Football ────────────────────────────────────────────
api.football.key=${API_FOOTBALL_KEY:}