
spring.application.name=backend
maven.basedir=@project.basedir@
# database init, supports mysql too
#spring.datasource.schema=classpath*:db/${database}/schema.sql
spring.mvc.pathpattern.matching-strategy=ant_path_matcher
# Configuración de MariaDB — usar variables de entorno en producción
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/draftleague?tinyInt1isBit=false}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:juan}

spring.jpa.hibernate.ddl-auto=none
# Deshabilitar show-sql en producción (usar logging en su lugar)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# H2 console deshabilitada (se usa MariaDB, no H2)
spring.h2.console.enabled=false

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=false

# Scripts Configuration
scripts.path=scripts
scripts.python=python3

# API-Football
api.football.key=${API_FOOTBALL_KEY:}
server.port=9090

# XGBoost ML microservice
ml.xgboost.url=${ML_XGBOOST_URL:http://localhost:8000}
ml.xgboost.internal-key=${INTERNAL_API_KEY:}
ml.xgboost.timeout-seconds=5

